<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Réinitialiser le mot de passe — TOURÉ IMMOBILIER</title>
<style>
  :root {
    --navy: #12314F; --navy-dark: #0B1F35; --gold: #C9A227; --gold-light: #E8CE7A;
    --text: #1F2937; --muted: #6B7280; --border: #E2E6EB; --ok: #16a34a; --danger: #dc2626;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; font-family: 'Segoe UI', -apple-system, Roboto, Arial, sans-serif;
    background: linear-gradient(160deg, var(--navy-dark), var(--navy) 70%);
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .card { background: #fff; border-radius: 16px; padding: 32px; max-width: 420px; width: 100%; box-shadow: 0 25px 60px rgba(0,0,0,.35); }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .brand .icon { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, var(--gold), #a8811c); display:flex; align-items:center; justify-content:center; font-size: 20px; }
  .brand .name { font-weight: 800; font-size: 16px; color: var(--navy); }
  .brand .sub { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
  h1 { font-size: 18px; margin: 0 0 16px; color: var(--navy); }
  label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; font-weight: 600; }
  input {
    width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 9px;
    font-size: 14px; margin-bottom: 14px; background: #fbfcfd;
  }
  input:focus { outline: none; border-color: var(--gold); background: #fff; }
  button {
    cursor: pointer; border: none; border-radius: 9px; padding: 11px 16px; font-size: 14px; width: 100%;
    background: linear-gradient(135deg, var(--gold), #a8811c); color: #2b2100; font-weight: 700;
  }
  button:disabled { opacity: .6; cursor: not-allowed; }
  .msg { padding: 12px 14px; border-radius: 9px; font-size: 13.5px; margin-bottom: 14px; }
  .msg.error { background: #fee2e2; color: var(--danger); }
  .msg.success { background: #dcfce7; color: var(--ok); }
  .footer-note { text-align: center; font-size: 11px; color: var(--muted); margin-top: 18px; }
  a { color: var(--navy); }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="icon">🏛️</div>
      <div>
        <div class="name">TOURÉ IMMOBILIER</div>
        <div class="sub">Réinitialisation du mot de passe</div>
      </div>
    </div>
    <div id="content">
      <h1>Choisissez un nouveau mot de passe</h1>
      <div id="msg-box"></div>
      <form id="reset-form">
        <label>Nouveau mot de passe</label>
        <input type="password" id="new-password" required minlength="4">
        <label>Confirmer le mot de passe</label>
        <input type="password" id="confirm-password" required minlength="4">
        <button type="submit" id="submit-btn">Réinitialiser le mot de passe</button>
      </form>
    </div>
    <div class="footer-note">Ce lien expire 1 heure après sa génération.</div>
  </div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get("token");
const msgBox = document.getElementById("msg-box");
const form = document.getElementById("reset-form");

if (!token) {
  form.style.display = "none";
  msgBox.innerHTML = `<div class="msg error">Lien invalide : aucun jeton de réinitialisation fourni.</div>`;
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const pass1 = document.getElementById("new-password").value;
  const pass2 = document.getElementById("confirm-password").value;
  msgBox.innerHTML = "";

  if (pass1 !== pass2) {
    msgBox.innerHTML = `<div class="msg error">Les deux mots de passe ne correspondent pas.</div>`;
    return;
  }

  const btn = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.textContent = "Réinitialisation...";

  try {
    const res = await fetch("/api/auth/reset-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token, new_password: pass1 }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.detail || "Erreur lors de la réinitialisation.");

    form.style.display = "none";
    msgBox.innerHTML = `<div class="msg success">✓ Mot de passe réinitialisé avec succès. Vous pouvez maintenant vous connecter avec votre nouveau mot de passe.</div>`;
  } catch (err) {
    msgBox.innerHTML = `<div class="msg error">${err.message}</div>`;
    btn.disabled = false;
    btn.textContent = "Réinitialiser le mot de passe";
  }
});
</script>
</body>
</html>
